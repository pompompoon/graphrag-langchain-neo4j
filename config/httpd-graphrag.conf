# ==============================================
# Apache リバースプロキシ設定
# React (localhost:3000) + FastAPI (localhost:8000)
# ==============================================
#
# 前提: httpd.conf で以下のモジュールが有効であること
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so
#   LoadModule rewrite_module modules/mod_rewrite.so
#   LoadModule headers_module modules/mod_headers.so
#
# 使い方:
#   httpd.conf に以下を追加:
#   Include conf/extra/httpd-graphrag.conf

<VirtualHost *:80>
    ServerName localhost

    # --- ログ ---
    ErrorLog "logs/graphrag-error.log"
    CustomLog "logs/graphrag-access.log" combined

    # --- CORS ヘッダー ---
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization"

    # --- SSE (Server-Sent Events) 対応 ---
    # ストリーミングレスポンスのバッファリングを無効化
    ProxyTimeout 300
    SetEnv proxy-sendchunked 1

    # --- API → FastAPI (localhost:8000) ---
    ProxyPass        /api http://localhost:8000/api
    ProxyPassReverse /api http://localhost:8000/api

    # --- FastAPI Swagger UI ---
    ProxyPass        /docs http://localhost:8000/docs
    ProxyPassReverse /docs http://localhost:8000/docs
    ProxyPass        /openapi.json http://localhost:8000/openapi.json
    ProxyPassReverse /openapi.json http://localhost:8000/openapi.json

    # --- React Dev Server (localhost:3000) ---
    # 開発時: npm start で起動したdevserverにプロキシ
    ProxyPass        / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # --- React WebSocket (Hot Reload用) ---
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:3000/$1 [P,L]

</VirtualHost>

